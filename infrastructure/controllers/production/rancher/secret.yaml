apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rancher-bootstrap-secret
  namespace: cattle-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  target:
    name: rancher-bootstrap-secret
  data:
    - secretKey: bootstrapPassword
      remoteRef:
        key: rancher-bootstrap-password
