apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: ahey-chat-db-backup
  namespace: ahey-chat
spec:
  # Daily at 02:00 UTC
  schedule: "0 0 2 * * *"
  cluster:
    name: ahey-chat-db
  backupOwnerReference: self
  # Take a backup immediately on first creation
  immediate: true
