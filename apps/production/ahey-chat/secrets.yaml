apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ahey-chat-db-secret
  namespace: ahey-chat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  data:
    - secretKey: password
      remoteRef:
        key: ahey-chat-db-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ahey-chat-cnpg-s3-creds
  namespace: ahey-chat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: ahey-chat-aws-access-key-id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: ahey-chat-aws-secret-access-key
    - secretKey: AWS_DEFAULT_REGION
      remoteRef:
        key: ahey-chat-aws-region
---
# Temporary: used only during Neon → CNPG migration bootstrap.
# Remove after migration is confirmed and steady-state bootstrap.recovery is in place.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: neon-connection-secret
  namespace: ahey-chat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  data:
    - secretKey: password
      remoteRef:
        key: neon-ahey-chat-db-password
