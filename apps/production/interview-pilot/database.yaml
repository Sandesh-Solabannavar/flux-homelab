apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: interview-pilot-db
  namespace: interview-pilot
spec:
  description: Postgres cluster for the interview-pilot application
  imageName: quay.io/enterprisedb/postgresql:17.7
  # 1 instance: nodes are CPU-request-saturated (100% on all 3 nodes).
  # CNPG hardcodes 100m CPU request on its init container per pod — cannot be removed.
  # Data safety is provided by continuous WAL archiving + daily S3 base backups (PITR).
  # Increase to 3 when CPU request headroom is available.
  instances: 1

  monitoring:
    enablePodMonitor: true

  inheritedMetadata:
    labels:
      app: interview-pilot-database
      policy-type: "database"

  storage:
    storageClass: local-path
    size: 5Gi

  resources:
    requests:
      memory: 200Mi

  backup:
    barmanObjectStore:
      destinationPath: s3://interview-pilot-db-988182270694-ap-south-1/interview-pilot-db
      # serverName differentiates this cluster's WAL archive from the original.
      # Original used 'interview-pilot-db'; using 'interview-pilot-db-v2' so the archive check
      # sees an empty path and allows recovery bootstrap to proceed.
      serverName: interview-pilot-db-v2
      s3Credentials:
        accessKeyId:
          name: interview-pilot-cnpg-s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: interview-pilot-cnpg-s3-creds
          key: ACCESS_SECRET_KEY
        region:
          name: interview-pilot-cnpg-s3-creds
          key: AWS_DEFAULT_REGION
      wal:
        compression: gzip
        maxParallel: 8
      data:
        compression: gzip
        immediateCheckpoint: false
    retentionPolicy: "30d"

  # Steady-state DR bootstrap: if the cluster is ever deleted,
  # CNPG will restore from S3 + replay WAL to the latest consistent point.
  bootstrap:
    recovery:
      source: interview-pilot-db-s3

  # S3 source for recovery bootstrap.
  externalClusters:
    - name: interview-pilot-db-s3
      barmanObjectStore:
        destinationPath: s3://interview-pilot-db-988182270694-ap-south-1/interview-pilot-db
        # serverName must match the name used when the original backup was created.
        serverName: interview-pilot-db
        s3Credentials:
          accessKeyId:
            name: interview-pilot-cnpg-s3-creds
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: interview-pilot-cnpg-s3-creds
            key: ACCESS_SECRET_KEY
          region:
            name: interview-pilot-cnpg-s3-creds
            key: AWS_DEFAULT_REGION
        wal:
          maxParallel: 8
