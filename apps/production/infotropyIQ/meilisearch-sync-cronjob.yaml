apiVersion: batch/v1
kind: CronJob
metadata:
  name: meilisearch-companies-sync
  namespace: infotropyiq
spec:
  schedule: "0 2 * * *" # Every day at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: sync
              image: 192.168.1.11:5000/infotropyiq-server:latest
              command: ["bun", "run", "sync:companies"]
              envFrom:
                - secretRef:
                    name: infotropyiq-env
              env:
                - name: MEILISEARCH_HOST
                  value: "http://meilisearch.meilisearch.svc.cluster.local:7700"
          restartPolicy: OnFailure
---
