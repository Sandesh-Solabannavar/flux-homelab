apiVersion: apps/v1
kind: Deployment
metadata:
  name: carousel-approval-bot
  namespace: carousel-agent
  labels:
    app: carousel-approval-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carousel-approval-bot
  template:
    metadata:
      labels:
        app: carousel-approval-bot
    spec:
      containers:
        - name: approval-bot
          image: 192.168.1.11:5000/carousel-agent:latest
          imagePullPolicy: Always
          command: ["node", "dist/index.js"]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: carousel-agent-secret
          volumeMounts:
            - name: carousel-data
              mountPath: /app/pending
              subPath: pending
            - name: carousel-data
              mountPath: /app/output
              subPath: output
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              # Remotion renders MP4s via Chromium+ffmpeg in this pod;
              # 4Gi RAM and 2 vCPU prevent OOM during /video commands.
              memory: "4Gi"
              cpu: "2000m"
      volumes:
        - name: carousel-data
          persistentVolumeClaim:
            claimName: carousel-agent-pvc
