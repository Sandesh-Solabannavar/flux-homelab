---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: health-app-web
  namespace: health-app
  labels:
    app: health-app-web
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: health-app-web
  template:
    metadata:
      labels:
        app: health-app-web
    spec:
      containers:
        - name: health-app-web
          image: 192.168.1.11:5000/health-app-web:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: BACKEND_URL
              value: "http://health-app-server:3000/api"
          ports:
            - containerPort: 80
