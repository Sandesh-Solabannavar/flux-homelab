apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-scraper-au
  namespace: data-scraper
  labels:
    app: data-scraper-au
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-scraper-au
  template:
    metadata:
      labels:
        app: data-scraper-au
    spec:
      containers:
        - name: data-scraper-au
          image: ghcr.io/sandesh-solabannavar/zoominfo-scraper:2f81d5b
          imagePullPolicy: IfNotPresent # Important for using remote images
          ports:
            - containerPort: 3000
          env:
            - name: COUNTRY
              value: NL
            - name: METHOD
              value: main
            - name: ORDER
              value: asc
            - name: LIMIT
              value: "100"
          envFrom:
            - secretRef:
                name: data-scraper-secrets
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
      imagePullSecrets:
        - name: ghcr-login-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-scraper-au-desc
  namespace: data-scraper
  labels:
    app: data-scraper-au-desc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-scraper-au-desc
  template:
    metadata:
      labels:
        app: data-scraper-au-desc
    spec:
      containers:
        - name: data-scraper-au-desc
          image: ghcr.io/sandesh-solabannavar/zoominfo-scraper:2f81d5b
          imagePullPolicy: IfNotPresent # Important for using remote images
          ports:
            - containerPort: 3000
          env:
            - name: COUNTRY
              value: NL
            - name: METHOD
              value: main
            - name: ORDER
              value: desc
            - name: LIMIT
              value: "100"
          envFrom:
            - secretRef:
                name: data-scraper-secrets
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
      imagePullSecrets:
        - name: ghcr-login-secret
---
# Priority	Code	Country	Why
# 🔴 High	NL	Netherlands	Large B2B market, Amsterdam tech scene
# 🔴 High	FR	France	2nd largest European economy
# 🔴 High	ES	Spain	Major EU economy, growing tech scene
# 🔴 High	IT	Italy	3rd largest European economy
# 🟡 Medium	SE	Sweden	Nordic tech hub (Spotify, Klarna)
# 🟡 Medium	BR	Brazil	Largest Latin American economy
# 🟡 Medium	NZ	New Zealand	Similar profile to AU (already scraped)
# 🟡 Medium	MY	Malaysia	Southeast Asian market (adjacent to SG)
# 🟡 Medium	PH	Philippines	Large BPO/outsourcing market
# 🟡 Medium	NO	Norway	High-income Nordic market
# 🟡 Medium	CH	Switzerland	Highest GDP per capita in Europe
# 🟢 Lower	PL	Poland	Fast-growing EU tech talent pool
# 🟢 Lower	UA	Ukraine	Large tech talent pool
# 🟢 Lower	RO	Romania	Growing Eastern EU tech hub
