apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-scraper-dashboard
  namespace: data-scraper
  labels:
    app: data-scraper-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-scraper-dashboard
  template:
    metadata:
      labels:
        app: data-scraper-dashboard
    spec:
      containers:
        - name: data-scraper-dashboard
          image: ghcr.io/sandesh-solabannavar/zoominfo-scraper:751d0d7
          imagePullPolicy: IfNotPresent # Important for using remote images
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: METHOD
              value: dashboard
            - name: DASHBOARD_PORT
              value: "3000"
            - name: DASHBOARD_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: data-scraper-secrets
                  key: DASHBOARD_AUTH_TOKEN
                  optional: true
          envFrom:
            - secretRef:
                name: data-scraper-secrets
          resources:
            requests:
              cpu: 100m
              memory: "128Mi"
            limits:
              cpu: 500m
              memory: "512Mi"
      imagePullSecrets:
        - name: ghcr-login-secret
---
apiVersion: v1
kind: Service
metadata:
  name: data-scraper-dashboard
  namespace: data-scraper
  labels:
    app: data-scraper-dashboard
spec:
  selector:
    app: data-scraper-dashboard
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  type: LoadBalancer
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dashboard-snapshot
  namespace: data-scraper
spec:
  schedule: "0 6 * * *" # daily at 6am
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-login-secret
          containers:
            - name: snapshot
              image: ghcr.io/sandesh-solabannavar/zoominfo-scraper:751d0d7
              command: ["node", "dist/scripts/dashboard-snapshot.js"]
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: redis-secret
                      key: redis-password
                - name: REDIS_URL
                  value: "redis://:$(REDIS_PASSWORD)@redis-replication.data-scraper.svc.cluster.local:6379"
              envFrom:
                - secretRef:
                    name: data-scraper-secrets
